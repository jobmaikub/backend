name: Backend CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-ci:
    name: Backend CI (NestJS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint || true

      - name: Build application
        run: npm run build

      - name: Run Unit Tests
        run: npm run test

      - name: Run E2E Tests
        run: npm run test:e2e -- --forceExit
        env:
          SUPABASE_URL: https://dummy-supabase.co
          SUPABASE_SERVICE_ROLE_KEY: dummy-key
          RESEND_API_KEY: dummy-key
          RESEND_FROM_EMAIL: no-reply@example.com

  backend-deploy:
    name: Deploy Backend (Render)
    needs: backend-ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "Error: RENDER_DEPLOY_HOOK_URL secret is not set!"
            exit 1
          fi
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
